<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>오프라인 — MANMIN 배관산정</title>
<link rel="icon" href="./icons/favicon.ico"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:linear-gradient(135deg,#0f3460,#0f4c81);display:flex;align-items:center;justify-content:center;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:#fff;}
.container{text-align:center;padding:40px 24px;max-width:420px;}
.icon{font-size:72px;margin-bottom:24px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
h1{font-size:22px;font-weight:900;margin-bottom:12px;letter-spacing:-.02em;}
p{font-size:14px;color:rgba(255,255,255,.75);line-height:1.6;margin-bottom:28px;}
.btn{background:linear-gradient(135deg,#42a5f5,#1976d2);color:#fff;border:none;padding:13px 28px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(66,165,245,.4);transition:all .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(66,165,245,.5);}
.sub{margin-top:20px;font-size:12px;color:rgba(255,255,255,.5);}
</style>
</head>
<body>
<div class="container">
  <div class="icon">📡</div>
  <h1>오프라인 상태입니다</h1>
  <p>인터넷 연결이 없어도 캐시된 데이터로 배관산정을 계속 사용할 수 있습니다.<br/>연결 후 새로고침하면 최신 버전을 불러옵니다.</p>
  <button class="btn" onclick="location.href='./'">🔄 앱으로 돌아가기</button>
  <p class="sub">CIVIL ENGINEER KIM MANMIN Ver 2.0</p>
</div>
</body>
</html>
